name: Check Upstream

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  workflow_dispatch: {} # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'

      - name: Check for upstream changes
        run: go run tools/check-upstream/main.go

      - name: Open issue if upstream changed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream HQC has new tags beyond v5.0.0';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream'
            });
            if (issues.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: 'The weekly upstream check found new tags at https://gitlab.com/pqc-hqc/hqc/. Review and update go-hqc if needed.',
              labels: ['upstream']
            });
